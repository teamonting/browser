<!doctype html>
<html lang="en">
  <head>
    <script type="importmap">
      {
        "imports": {
          "@onting/browser": "https://cdn.jsdelivr.net/npm/@onting/browser@main/static/index.js",
          "@onting/stub": "https://cdn.jsdelivr.net/npm/@onting/stub@main/dist/index.js"
        }
      }
    </script>
  </head>
  <body>
    <button data-testid="click-me" type="button">Inside click me</button>
    <script type="module">
      document.querySelector('[data-testid="click-me"]').addEventListener('click', ({ currentTarget }) => {
        currentTarget.textContent = 'Inside clicked';
        currentTarget.style.backgroundColor = 'red';
        currentTarget.style.borderColor = 'white';
        currentTarget.style.color = 'white';
      });
    </script>
    <script type="module">
      import { getStub } from '@onting/browser';

      const stub = getStub();

      // Print timestamp
      const timestamp = await stub.getTimestamp();

      const headingElement = document.createElement('h1');

      headingElement.textContent = timestamp;

      document.body.appendChild(headingElement);

      await stub.test(document.body);

      console.log(await stub.click(document.querySelector('[data-testid="click-me"]')));
    </script>
  </body>
</html>
