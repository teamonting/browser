<!doctype html>
<html lang="en">
  <head>
    <script type="importmap">
      {
        "imports": {
          "@onting/browser": "http://localhost:5002/index.js",
          "@onting/stub": "http://localhost:5001/index.js"
        }
      }
    </script>
  </head>
  <body>
    <button data-testid="click-me" type="button">Click me</button>
    <iframe src="iframe.html"></iframe>
    <script type="module">
      document.querySelector('[data-testid="click-me"]').addEventListener('click', ({ currentTarget }) => {
        currentTarget.textContent = 'Clicked';
        currentTarget.style.backgroundColor = 'red';
        currentTarget.style.borderColor = 'white';
        currentTarget.style.color = 'white';
      });
    </script>
    <script type="module">
      import { getStub } from '@onting/browser';

      const stub = getStub();

      console.log('got stub', stub);

      // Set viewport
      await stub.setViewport(640, 480);

      console.log('set viewport');

      // Print timestamp
      const timestamp = await stub.getTimestamp();

      const headingElement = document.createElement('h1');

      headingElement.textContent = timestamp;

      document.body.appendChild(headingElement);

      // Capture screenshot
      // console.log(await stub.captureScreenshot());

      console.log(await stub.test(document.body));
      console.log(await stub.click(document.querySelector('[data-testid="click-me"]')));
    </script>
  </body>
</html>
