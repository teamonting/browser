<!doctype html>
<html lang="en">
  <head>
    <script type="importmap">
      {
        "imports": {
          "@onting/browser/browser.js": "https://esm.sh/@onting/browser@main/browser.js",
          "@onting/stub": "https://esm.sh/@onting/stub@main"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import { getStub } from '@onting/browser/browser.js';
      import stubDeclaration from '@onting/stub';

      const stub = getStub(stubDeclaration);

      console.log(stub);

      // Print timestamp
      const timestamp = await stub.getTimestamp();

      const headingElement = document.createElement('h1');

      headingElement.textContent = timestamp;

      document.body.appendChild(headingElement);

      // Capture screenshot
      console.log(await stub.captureScreenshot());
    </script>
  </body>
</html>
