<!doctype html>
<html lang="en">
  <head>
    <script type="importmap">
      {
        "imports": {
          "@onting/browser/browser.js": "https://cdn.jsdelivr.net/npm/@onting/browser@main/static/browser.js",
          "@onting/stub": "https://cdn.jsdelivr.net/npm/@onting/stub@main/dist/index.js"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import { getStub } from '@onting/browser/browser.js';

      const stub = getStub();

      // Print timestamp
      const timestamp = await stub.getTimestamp();

      const headingElement = document.createElement('h1');

      headingElement.textContent = timestamp;

      document.body.appendChild(headingElement);

      // Capture screenshot
      console.log(await stub.captureScreenshot());

      await stub.setViewport(640, 480);
    </script>
  </body>
</html>
